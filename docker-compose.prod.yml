services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techops-ai-agents-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: techops-ai-agents-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/techops-ai-agents.docker.conf:/etc/nginx/conf.d/default.conf:ro
